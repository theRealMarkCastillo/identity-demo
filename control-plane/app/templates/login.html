<!DOCTYPE html>
<html>
<head>
  <title>Identity Demo - Login</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 420px; margin: 60px auto; padding: 24px; }
    h1 { font-size: 20px; margin: 0 0 8px; }
    .sub { color: #666; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: #444; margin-top: 12px; }
    input { width: 100%; padding: 8px; font-size: 14px; box-sizing: border-box; margin-top: 4px; }
    button { margin-top: 20px; width: 100%; padding: 10px; background: #2563eb; color: white; border: none; font-size: 14px; cursor: pointer; }
    .error { color: #b91c1c; font-size: 13px; margin-top: 12px; }
    .hint { font-size: 11px; color: #888; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Identity Demo - Sign In</h1>
  <div class="sub">Client: <code>{{ client_id }}</code></div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/authorize">
    <input type="hidden" name="client_id" value="{{ client_id }}">
    <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
    <input type="hidden" name="scope" value="{{ scope }}">
    <input type="hidden" name="state" value="{{ state }}">
    <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
    <label>User ID</label>
    <input name="user_id" value="user_123" required>
    <label>Password</label>
    <input name="password" type="password" value="pw123" required>
    <button type="submit">Sign In</button>
    <div class="hint">Try: user_123 (senior_analyst), user_456 (junior_analyst), user_789 (auditor) — password: pw123</div>
  </form>
</body>
</html>
