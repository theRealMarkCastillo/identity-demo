<!DOCTYPE html>
<html>
<head>
  <title>Identity Demo - Sign In</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 420px; margin: 80px auto; padding: 24px; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    .sub { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    button { margin-top: 20px; width: 100%; padding: 12px; background: #2563eb; color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer; border-radius: 4px; }
    button:hover { background: #1d4ed8; }
    .hint { font-size: 12px; color: #64748b; margin-top: 16px; padding: 12px; background: #1e293b; border-radius: 4px; }
    .hint b { color: #cbd5e1; }
  </style>
</head>
<body>
  <h1>Identity Demo</h1>
  <div class="sub">Sign in to start the OAuth 2.1 + RLS demo</div>
  <form method="post" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <button type="submit">Sign in with Control Plane</button>
    <div class="hint">
      <b>Demo users:</b><br>
      • user_123 — senior_analyst (read + write)<br>
      • user_456 — junior_analyst (read only)<br>
      • user_789 — auditor (read shared)<br>
      Password for all: <b>pw123</b>
    </div>
  </form>
</body>
</html>
